<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex Switch Web</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="topbar-left">
          <h1 class="topbar-title">Codex 账号切换台</h1>
          <span class="topbar-badge">Local Control Console</span>
        </div>
        <div class="topbar-right">
          <div class="topbar-stat">
            <span class="topbar-stat-label">Profile</span>
            <strong id="activeProfile">加载中</strong>
          </div>
          <div class="topbar-stat">
            <span class="topbar-stat-label">状态</span>
            <strong id="loginStatus">加载中</strong>
          </div>
          <div class="topbar-stat">
            <span class="topbar-stat-label">账号</span>
            <strong id="activeAccountEmail">加载中</strong>
          </div>
          <div class="topbar-stat topbar-stat-usage">
            <span class="topbar-stat-label">额度</span>
            <strong id="activeUsageTitle">加载中</strong>
            <div class="topbar-meter">
              <div id="activeUsageMeterBar" class="topbar-meter-bar"></div>
            </div>
          </div>
        </div>
      </header>

      <section class="toolbar">
        <div class="toolbar-group">
          <button id="startLoginButton" class="btn btn-primary" type="button">
            <svg class="btn-icon" viewBox="0 0 16 16" fill="none"><path d="M8 1v10m0 0L4.5 7.5M8 11l3.5-3.5M2 14h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            CLI 登录
          </button>
          <button id="startDeviceLoginButton" class="btn btn-secondary" type="button">
            <svg class="btn-icon" viewBox="0 0 16 16" fill="none"><rect x="2" y="3" width="12" height="9" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M5 14h6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
            设备码登录
          </button>
          <button id="logoutButton" class="btn btn-ghost btn-danger" type="button">登出</button>
        </div>
        <div class="toolbar-divider"></div>
        <div class="toolbar-switch">
          <div class="switch-info">
            <strong id="autoSwitchTitle">自动切号未启用</strong>
            <small id="autoSwitchMeta" class="muted">用尽后按优先级自动切换</small>
          </div>
          <button id="autoSwitchToggleButton" class="btn btn-switch" type="button">开启</button>
        </div>
      </section>

      <section class="profiles-section">
        <div class="section-head">
          <h2>账号列表</h2>
          <small class="muted" id="profilesDir">加载中</small>
        </div>
        <div id="profilesGrid" class="profiles-list"></div>
      </section>

      <div id="toast" class="toast hidden"></div>
    </main>

    <template id="profileTemplate">
      <article class="profile-strip">
        <div class="strip-bar">
          <div class="strip-status">
            <span class="strip-active-dot hidden"></span>
            <span class="strip-avatar"></span>
          </div>
          <div class="strip-info">
            <span class="profile-name"></span>
            <span class="profile-email muted"></span>
          </div>
          <div class="strip-meta">
            <span class="strip-plan muted"></span>
          </div>
          <div class="strip-usage-mini">
            <span class="strip-usage-pct">--%</span>
            <div class="strip-usage-track">
              <div class="strip-usage-fill"></div>
            </div>
          </div>
          <div class="strip-reset">
            <svg class="strip-reset-icon" viewBox="0 0 16 16" fill="none"><path d="M8 4v4l2.5 1.5M14 8A6 6 0 1 1 8 2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 2v3h-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span class="strip-reset-label muted">--</span>
          </div>
          <div class="strip-actions">
            <button class="btn btn-sm btn-primary use-button">
              <svg class="btn-icon" viewBox="0 0 16 16" fill="none"><path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
              切换
            </button>
            <button class="btn btn-sm btn-delete delete-button" type="button" title="删除此账号">
              <svg class="btn-icon" viewBox="0 0 16 16" fill="none"><path d="M3 4.5h10M6.5 4.5V3a1 1 0 0 1 1-1h1a1 1 0 0 1 1 1v1.5M5 4.5l.5 8.5a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1l.5-8.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              删除
            </button>
          </div>
          <button class="strip-toggle" type="button" aria-label="展开详情">
            <svg class="strip-chevron" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>

        <div class="strip-detail">
          <div class="detail-grid">
            <dl class="facts">
              <div>
                <dt>显示名</dt>
                <dd class="fact-name">-</dd>
              </div>
              <div>
                <dt>登录模式</dt>
                <dd class="fact-auth-mode">-</dd>
              </div>
              <div>
                <dt>套餐类型</dt>
                <dd class="fact-plan">-</dd>
              </div>
              <div>
                <dt>最后刷新</dt>
                <dd class="fact-refresh">-</dd>
              </div>
              <div class="fact-full">
                <dt>本地路径</dt>
                <dd class="fact-path">-</dd>
              </div>
            </dl>

            <div class="usage-box">
              <div class="usage-hero">
                <div>
                  <strong class="usage-title">剩余额度</strong>
                  <p class="usage-note"></p>
                </div>
                <span class="usage-badge">--</span>
              </div>
              <div class="usage-lines"></div>
            </div>
          </div>
        </div>
      </article>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
